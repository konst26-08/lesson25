[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/health.json"
  to = "/health.json"
  status = 200
  force = false

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/health.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://mc.yandex.ru; style-src 'self'; img-src 'self' data: https://mc.yandex.ru; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
